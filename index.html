<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Music Player</title>
</head>
<body>
    <div class="container">
        <div class="music-player">
            <div class="list" id="list">
                <div class="head">
                    <h3>Playlist</h3>
                    <div class="back"><i class="fa-solid fa-angle-right"></i></div>
                </div>
                <ul id="playlist-songs">
                    <!-- songs will be added here dynamically by JavaScript -->
                </ul>
            </div>
            <nav>
                <div class="playlist"><i class="fa-solid fa-bars"></i></div>
                <div class="theme-toggle"><i class="fa-solid fa-moon"></i></div>
            </nav>
            <img class="cover-photo" id="cover-photo" src="" alt="">
            <audio src="" id="song"></audio>
            <h2 id="song-title">Song-title</h2>
            <p id="artist">Artist</p>
            <div class="timeline">
                <span id="current-time">0:00</span>
                <input class="progress" type="range" id="progress" value="0">
                <span id="duration">0:00</span>
            </div>
            <div class="controls">
                <div class="shuffle"><i class="fa-solid fa-shuffle"></i></div>
                <div class="backward"><i class="fa-solid fa-backward"></i></div>
                <div class="play-pause-btns"><i class="fa-solid fa-play"></i></div>
                <div class="forward"><i class="fa-solid fa-forward"></i></div>
                <div class="repeat"><i class="fa-solid fa-repeat"></i></div>
            </div>
            <div class="controls-2">
                <div id="volume"><i class="fa-solid fa-volume-high"></i></div>
                <input class="volume-bar" type="range" min="0" max="1" step="0.1">
            </div>
        </div>
    </div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
